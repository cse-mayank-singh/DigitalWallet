# Server Configuration
server.port=8080

# Spring Application Configuration
spring.application.name=API-GATEWAY
spring.main.web-application-type=reactive

# Gateway Routes Configuration
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/user/**

spring.cloud.gateway.routes[2].id=wallet-service
spring.cloud.gateway.routes[2].uri=lb://WALLET-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/wallet/**

spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/admin/**

spring.cloud.gateway.routes[4].id=rewards-service
spring.cloud.gateway.routes[4].uri=lb://REWARDS-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/rewards/**

# Service Discovery Configuration
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true